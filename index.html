or: var(--text);\n  background: rgba(255, 255, 255, 0.05);\n}\n\n.modal {\n  position: absolute;\n  inset: 0;\n  display: none;\n  align-items: center;\n  justify-content: center;\n  background: rgba(9, 8, 10, 0.76);\n  z-index: 3;\n  padding: 18px;\n}\n\n.modal.show {\n  display: flex;\n}\n\n.modal-card {\n  width: 100%;\n  padding: 22px 18px 18px;\n  border-radius: 24px;\n  background: linear-gradient(180deg, #311921, #1a0d12);\n  border: 1px solid var(--line-strong);\n}\n\n.modal-card h3 {\n  font-size: 18px;\n}\n\n.modal-card p {\n  margin-top: 8px;\n  font-size: 12px;\n  line-height: 1.7;\n  color: var(--text-soft);\n}\n\n.money-input {\n  width: 100%;\n  margin-top: 14px;\n  border-radius: 16px;\n  border: 1px solid var(--line);\n  background: rgba(255, 255, 255, 0.05);\n  color: var(--text);\n  padding: 14px 16px;\n  font-size: 20px;\n  outline: none;\n}\n\n.empty-state {\n  padding: 28px 20px;\n  text-align: center;\n  color: var(--text-dim);\n  font-size: 12px;\n  line-height: 1.8;\n  border-radius: 20px;\n  background: rgba(255, 255, 255, 0.03);\n  border: 1px dashed var(--line);\n}\n</style>\n</head>\n<body>\n<div class="app-shell">\n  <div class="phone">\n    <div class="topbar">\n      <button class="back-btn hidden" id="back-btn" type="button">←</button>\n      <div class="title-wrap">\n        <div class="title" id="top-title">发现</div>\n        <div class="subtitle" id="top-subtitle">在线裸聊匹配中</div>\n      </div>\n      <button class="top-action hidden" id="top-action" type="button">⋯</button>\n    </div>\n\n    <div class="page active" id="page-discover">\n      <div class="page-scroll">\n        <div class="hero">\n          <div class="hero-title">蜜语</div>\n          <div class="hero-text">这是一个首楼内直接游玩的裸聊 APP。点开头像看资料，进私聊、要自拍、转账、刷朋友圈，都在这个界面里完成，不需要再去用酒馆底部输入框。</div>\n          <div class="hero-tags">\n            <span class="chip">实时私聊</span>\n            <span class="chip">可发图消息</span>\n            <span class="chip">转账互动</span>\n            <span class="chip">朋友圈动态</span>\n          </div>\n        </div>\n\n        <div class="section-title">\n          <h3>在线女生</h3>\n          <span id="discover-count">0 人在线</span>\n        </div>\n        <div class="girl-grid" id="girl-grid"></div>\n      </div>\n    </div>\n\n    <div class="page" id="page-profile">\n      <div class="profile-page">\n        <div class="profile-cover" id="profile-cover"></div>\n        <div class="profile-body">\n          <div class="profile-avatar-row">\n            <div class="profile-avatar" id="profile-avatar"></div>\n            <div class="profile-meta">\n              <h2 id="profile-name"></h2>\n              <p id="profile-meta"></p>\n            </div>\n          </div>\n\n          <div class="profile-stats">\n            <div class="stat-box">\n              <strong id="profile-like">0</strong>\n              <span>好感</span>\n            </div>\n            <div class="stat-box">\n              <strong id="profile-desire">0</strong>\n              <span>裸聊意愿</span>\n            </div>\n            <div class="stat-box">\n              <strong id="profile-stage">试探期</strong>\n              <span>阶段</span>\n            </div>\n          </div>\n\n          <div class="profile-text-card">\n            <h4>个人简介</h4>\n            <p id="profile-bio"></p>\n            <div class="tag-list" id="profile-tags"></div>\n          </div>\n\n          <div class="profile-text-card">\n            <h4>她现在想要什么</h4>\n            <p id="profile-want"></p>\n          </div>\n\n          <div class="action-row">\n            <button class="btn btn-secondary" id="profile-moments" type="button">看她朋友圈</button>\n            <button class="btn btn-primary" id="profile-chat" type="button">进入私聊</button>\n          </div>\n        </div>\n      </div>\n    </div>\n\n    <div class="page" id="page-messages">\n      <div class="page-scroll">\n        <div class="section-title">\n          <h3>消息列表</h3>\n          <span>点开继续聊</span>\n        </div>\n        <div class="message-list" id="message-list"></div>\n      </div>\n    </div>\n\n    <div class="page page-chat" id="page-chat">\n      <div class="chat-stage" id="chat-stage"></div>\n      <div class="quick-bar" id="quick-bar"></div>\n      <div class="chat-list" id="chat-list"></div>\n      <div class="chat-toolbar">\n        <div class="emoji-bar" id="emoji-bar"></div>\n        <div class="input-row">\n          <button class="input-icon" id="emoji-toggle" type="button">☺</button>\n          <input class="chat-input" id="chat-input" type="text" placeholder="直接在 APP 里回复她……">\n          <button class="input-icon" id="transfer-open" type="button">¥</button>\n          <button class="send-btn" id="send-btn" type="button">➤</button>\n        </div>\n      </div>\n    </div>\n\n    <div class="page" id="page-moments">\n      <div class="page-scroll">\n        <div class="section-title">\n          <h3>朋友圈</h3>\n          <span>由 AI 自己生成</span>\n        </div>\n        <div class="moment-list" id="moment-list"></div>\n      </div>\n    </div>\n\n    <div class="page" id="page-mine">\n      <div class="page-scroll">\n        <div class="mine-grid">\n          <div class="mine-box">\n            <span>我的余额</span>\n            <strong id="wallet-balance">¥0</strong>\n          </div>\n          <div class="mine-box">\n            <span>累计转账</span>\n            <strong id="wallet-spent">¥0</strong>\n          </div>\n        </div>\n\n        <div class="mine-card" style="padding:16px;margin-bottom:12px;">\n          <h4>当前玩法</h4>\n          <p>这张卡的核心目标就是冲着裸聊去。普通寒暄只用来铺垫，关系升温后会自然进入自拍、语音、视频邀请和更露骨的互动；真正的聊天过程全部在首楼 APP 里完成。</p>\n        </div>\n\n        <div class="mine-menu">\n          <div class="menu-item"><span>💬</span><span>聊天在 APP 内发送</span><span>已启用</span></div>\n          <div class="menu-item"><span>🖼</span><span>wimg/img 插图支持</span><span>已接入</span></div>\n          <div class="menu-item"><span>🌸</span><span>朋友圈由 AI 自行刷新</span><span>已接入</span></div>\n          <div class="menu-item"><span>💸</span><span>转账会影响角色反应</span><span>已接入</span></div>\n        </div>\n      </div>\n    </div>\n\n    <div class="navbar">\n      <button class="nav-item active" data-page="discover" type="button"><strong>♡</strong>发现</button>\n      <button class="nav-item" data-page="messages" type="button"><strong>✉</strong>消息</button>\n      <button class="nav-item" data-page="moments" type="button"><strong>☼</strong>朋友圈</button>\n      <button class="nav-item" data-page="mine" type="button"><strong>☻</strong>我的</button>\n    </div>\n\n    <div class="modal" id="transfer-modal">\n      <div class="modal-card">\n        <h3 id="transfer-title">转账</h3>\n        <p>金额会影响她的态度。小额更像打赏，大额会显著加快升温，但角色风格不同，回应方式也会不同。</p>\n        <input class="money-input" id="transfer-input" type="number" min="1" step="1" placeholder="输入金额">\n        <div class="action-row" style="margin-top:16px;">\n          <button class="btn btn-secondary" id="transfer-cancel" type="button">取消</button>\n          <button class="btn btn-primary" id="transfer-confirm" type="button">确认转账</button>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\nconst ROLE_META = [\n  {\n    key: "林晓柔",\n    id: "linxiaorou",\n    name: "林晓柔",\n    age: 20,\n    emoji: "🌸",\n    title: "邻家甜妹",\n    tags: ["撒娇", "黏人", "软糯"],\n    bio: "大二学生，聊天时爱撒娇，表面羞，熟了以后会一边脸红一边主动发更私密的内容。",\n    want: "想被耐心哄着，喜欢一点点升温，再顺势过渡到自拍和视频。"\n  },\n  {\n    key: "苏玥",\n    id: "suyue",\n    name: "苏玥",\n    age: 28,\n    emoji: "🔥",\n    title: "成熟御姐",\n    tags: ["掌控", "强势", "主导"],\n    bio: "广告公司高管，回复直接，喜欢掌控聊天节奏。她不会浪费时间，觉得你合胃口才会更主动。",\n    want: "想看你够不够懂事，够不够上道，再决定要不要把尺度彻底放开。"\n  },\n  {\n    key: "沈念",\n    id: "shennian",\n    name: "沈念",\n    age: 19,\n    emoji: "🌙",\n    title: "清纯学妹",\n    tags: ["害羞", "慢热", "配合"],\n    bio: "看起来像乖乖女，实际也是冲着裸聊来的，只是嘴上不敢承认，需要你先把她聊热。",\n    want: "想被温柔带着走，想先被夸、被哄，慢慢才肯把更私密的欲望说出口。"\n  },\n  {\n    key: "叶桃",\n    id: "yetao",\n    name: "叶桃",\n    age: 25,\n    emoji: "🍑",\n    title: "火辣主动",\n    tags: ["挑逗", "大胆", "会玩"],\n    bio: "一上来就会试探你的底线，喜欢说得露骨，也喜欢看你能不能接住她的节奏。",\n    want: "想快速进入主题，如果你够会聊，她会很快从挑逗进入更直接的裸聊推进。"\n  },\n  {\n    key: "方慧",\n    id: "fanghui",\n    name: "方慧",\n    age: 32,\n    emoji: "💼",\n    title: "温柔大姐姐",\n    tags: ["成熟", "包容", "慢炖"],\n    bio: "擅长让人放松，会在温柔气氛里把尺度一点点加深，越聊越黏，越聊越会宠你。",\n    want: "想被认真对待，喜欢长一点的私聊，等气氛足够浓再切进更露骨的内容。"\n  }\n];\n\nconst QUICK_REPLIES = ["想看你现在的样子", "夸她几句", "继续暧昧", "想视频", "今晚想裸聊"];\nconst EMOJIS = ["😘", "🥵", "😏", "🫦", "💋", "💦", "🔥", "❤️", "🙈", "😳"];\n\nfunction defaultRole(meta, extra) {\n  return Object.assign({\n    id: meta.id,\n    名称: meta.name,\n    年龄: meta.age,\n    头像: "",\n    封面: "",\n    emoji: meta.emoji,\n    类型: meta.title,\n    标签: meta.tags.slice(),\n    简介: meta.bio,\n    当前想法: meta.want,\n    当前状态: "在线，可私聊",\n    好感度: 15,\n    裸聊意愿: 10,\n    聊天次数: 0,\n    裸聊次数: 0,\n    转账收入: 0,\n    未读数: 0,\n    关系阶段: "试探期",\n    最后消息: "点开头像看看她的资料",\n    最后时间: "",\n    聊天记录: [\n      {\n        role: "assistant",\n        type: "text",\n        text: "点开我的头像先看看资料呀，合胃口再进来聊。",\n        time: ""\n      }\n    ]\n  }, extra || {});\n}\n\nconst DEFAULT_STATE = {\n  蜜语APP: {\n    当前页面: "discover",\n    当前角色: "",\n    钱包余额: 8888,\n    累计消费: 0,\n    图床域名: "https://【你的兰空域名】",\n    最新回复: "",\n    最新回复摘要: "",\n    最新回复时间: "",\n    最新回复序号: 0,\n    朋友圈刷新计数: 0\n  },\n  角色: {\n    林晓柔: defaultRole(ROLE_META[0]),\n    苏玥: defaultRole(ROLE_META[1]),\n    沈念: defaultRole(ROLE_META[2]),\n    叶桃: defaultRole(ROLE_META[3]),\n    方慧: defaultRole(ROLE_META[4])\n  },\n  朋友圈: {\n    动态列表: [\n      { id: "m1", 角色: "林晓柔", 内容: "今天刚洗完澡，吹头发的时候突然想起你了……", 时间: "刚刚", 图片: [], 点赞数: 9, 评论数: 2 },\n      { id: "m2", 角色: "苏玥", 内容: "下班，喝酒，洗澡。今晚谁表现好，谁就有奖励。", 时间: "18分钟前", 图片: [], 点赞数: 16, 评论数: 3 },\n      { id: "m3", 角色: "沈念", 内容: "睡不着的时候，人真的会想说很多平时不敢说的话……", 时间: "1小时前", 图片: [], 点赞数: 7, 评论数: 1 },\n      { id: "m4", 角色: "叶桃", 内容: "健身完冲澡，镜子有点好看。就是没人来夸。", 时间: "2小时前", 图片: [], 点赞数: 22, 评论数: 4 },\n      { id: "m5", 角色: "方慧", 内容: "成年人最危险的一句就是：只是想找个人聊聊。", 时间: "昨天", 图片: [], 点赞数: 14, 评论数: 5 }\n    ]\n  },\n  本次互动: {\n    对象: "",\n    类型: "日常",\n    金额: 0,\n    最新用户输入: "",\n    最新回复摘要: "",\n    好感变化: 0,\n    欲望变化: 0,\n    裸聊推进: "未开始"\n  }\n};\n\nconst app = {\n  state: deepClone(DEFAULT_STATE),\n  currentPage: "discover",\n  previousPage: "discover",\n  currentRoleKey: "",\n  pending: {},\n  loadingRole: "",\n  lastReplySeq: 0,\n  syncTimer: null\n};\n\nfunction deepClone(value) {\n  return JSON.parse(JSON.stringify(value));\n}\n\nfunction mergeState(base, patch) {\n  if (Array.isArray(base)) {\n    return Array.isArray(patch) ? patch : base;\n  }\n  if (base && typeof base === "object") {\n    const result = {};\n    const keys = new Set(Object.keys(base).concat(Object.keys(patch || {})));\n    keys.forEach(function(key) {\n      if (patch && Object.prototype.hasOwnProperty.call(patch, key)) {\n        if (\n          base[key] &&\n          typeof base[key] === "object" &&\n          !Array.isArray(base[key]) &&\n          patch[key] &&\n          typeof patch[key] === "object" &&\n          !Array.isArray(patch[key])\n        ) {\n          result[key] = mergeState(base[key], patch[key]);\n        } else {\n          result[key] = patch[key];\n        }\n      } else {\n        result[key] = base[key];\n      }\n    });\n    return result;\n  }\n  return patch === undefined ? base : patch;\n}\n\nfunction getRoleMetaByKey(roleKey) {\n  return ROLE_META.find(function(item) { return item.key === roleKey; });\n}\n\nfunction getRoleKeyById(roleId) {\n  const found = ROLE_META.find(function(item) { return item.id === roleId; });\n  return found ? found.key : "";\n}\n\nfunction getCurrentRoleKey() {\n  return app.currentRoleKey || ROLE_META[0].key;\n}\n\nfunction getRole(roleKey) {\n  return app.state.角色[roleKey];\n}\n\nfunction formatNow() {\n  const d = new Date();\n  const hh = String(d.getHours()).padStart(2, "0");\n  const mm = String(d.getMinutes()).padStart(2, "0");\n  return hh + ":" + mm;\n}\n\nfunction escapeHtml(text) {\n  return String(text || "")\n    .replace(/&/g, "&amp;")\n    .replace(/</g, "&lt;")\n    .replace(/>/g, "&gt;")\n    .replace(/"/g, "&quot;");\n}\n\nfunction toHtmlText(text) {\n  return escapeHtml(text).replace(/\\n/g, "<br>");\n}\n\nfunction formatMoney(num) {\n  const n = Number(num || 0);\n  return "¥" + n.toLocaleString("zh-CN");\n}\n\nfunction resolveImageSrc(value) {\n  const raw = String(value || "").trim();\n  if (!raw) return "";\n  if (/^https?:\\/\\//i.test(raw)) return raw;\n  const domain = String(app.state.蜜语APP.图床域名 || "").trim();\n  if (!domain || domain.indexOf("【") !== -1) return "";\n  return domain.replace(/\\/$/, "") + "/" + encodeURI(raw).replace(/#/g, "%23");\n}\n\nfunction avatarHtml(roleKey, className) {\n  const role = getRole(roleKey);\n  if (!role) return "";\n  const cls = className || "avatar";\n  if (role.头像) {\n    return \'<div class="\' + cls + \'"><img src="\' + escapeHtml(role.头像) + \'" alt="\' + escapeHtml(role.名称) + \'"></div>\';\n  }\n  return \'<div class="\' + cls + \'">\' + escapeHtml(role.emoji || "♡") + "</div>";\n}\n\nfunction coverHtml(roleKey, className) {\n  const role = getRole(roleKey);\n  if (!role) return "";\n  if (role.封面) {\n    return \'<div class="\' + className + \'"><img src="\' + escapeHtml(role.封面) + \'" alt="\' + escapeHtml(role.名称) + \'"></div>\';\n  }\n  return \'<div class="\' + className + \'"><div class="emoji-cover">\' + escapeHtml(role.emoji || "♡") + "</div></div>";\n}\n\nfunction tagListHtml(tags) {\n  return (tags || []).map(function(tag) {\n    return \'<span class="tag">\' + escapeHtml(tag) + "</span>";\n  }).join("");\n}\n\nfunction getConversation(roleKey) {\n  const server = ((getRole(roleKey) || {}).聊天记录 || []).slice();\n  const pending = (app.pending[roleKey] || []).slice();\n  return server.concat(pending);\n}\n\nfunction renderDiscover() {\n  const grid = document.getElementById("girl-grid");\n  const roleKeys = ROLE_META.map(function(item) { return item.key; });\n
